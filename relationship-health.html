<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relationship Health</title>
    <style>
        :root {
            --primary: #0078d4;
            --accent-green: #107c10;
            --accent-green-light: #dff6dd;
            --accent-orange: #ca5010;
            --accent-orange-light: #fff4ce;
            --accent-red: #d13438;
            --accent-red-light: #fde7e9;
            --text: #242424;
            --text-secondary: #616161;
            --text-tertiary: #9e9e9e;
            --border: #e0e0e0;
            --bg: #ffffff;
            --bg-subtle: #fafafa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 12px 14px;
            overflow: hidden;
        }

        /* ─── Header ─── */
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .header-icon {
            width: 18px;
            height: 18px;
            opacity: 0.7;
        }
        .header h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        .header .info-icon {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1.5px solid var(--text-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: var(--text-tertiary);
            cursor: help;
            flex-shrink: 0;
        }

        /* ─── Health Status ─── */
        .health-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .health-badge {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .health-badge svg {
            width: 18px;
            height: 18px;
        }
        .health-badge.good {
            background: var(--accent-green);
        }
        .health-badge.good svg { fill: #ffffff; }
        .health-badge.fair {
            background: var(--accent-orange);
        }
        .health-badge.fair svg { fill: #ffffff; }
        .health-badge.poor {
            background: var(--accent-red);
        }
        .health-badge.poor svg { fill: #ffffff; }

        .health-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
        }

        /* ─── Activity Section ─── */
        .section {
            margin-bottom: 10px;
        }
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .activity-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
        }
        .activity-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        .activity-icon svg {
            width: 16px;
            height: 16px;
        }
        .activity-icon.none svg { fill: var(--accent-red); }
        .activity-icon.has svg { fill: var(--text-secondary); }

        .activity-text {
            font-size: 13px;
            color: var(--text);
            line-height: 1.4;
        }
        .activity-detail {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* ─── Activity Stats Grid ─── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 6px;
        }
        .stat-card {
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 4px;
            text-align: center;
        }
        .stat-value {
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 2px;
        }
        .stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            line-height: 1.2;
        }

        /* ─── Health Gauge Bar ─── */
        .health-gauge {
            margin-bottom: 12px;
        }
        .gauge-bar-wrapper {
            position: relative;
            width: 100%;
            height: 8px;
            background: #e8e8e8;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .gauge-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease-out, background 0.5s ease;
        }
        .gauge-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-tertiary);
        }

        /* ─── Loading / Error / Empty ─── */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 140px;
            color: var(--text-secondary);
            gap: 10px;
            font-size: 13px;
        }
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-state {
            text-align: center;
            padding: 16px 14px;
            color: var(--text-secondary);
        }
        .error-state .error-icon { font-size: 26px; margin-bottom: 6px; }
        .error-state p { font-size: 13px; line-height: 1.4; }

        .no-data {
            text-align: center;
            padding: 20px 14px;
            color: var(--text-secondary);
        }
        .no-data .icon { font-size: 26px; margin-bottom: 6px; }
        .no-data p { font-size: 13px; }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <span>Loading relationship health...</span>
    </div>

    <div id="content" style="display:none;">
        <div class="header">
            <img class="header-icon" src="https://github.com/microsoft/fluentui-system-icons/raw/main/assets/Edit/SVG/ic_fluent_edit_48_regular.svg" alt="" />
            <h2>Relationship health</h2>
            <span class="info-icon" title="Relationship health is calculated from activity history including emails, meetings, and phone calls">i</span>
        </div>

        <div id="health-status" class="health-status"></div>

        <div class="health-gauge">
            <div class="gauge-bar-wrapper">
                <div id="gauge-bar" class="gauge-bar-fill" style="width:0%"></div>
            </div>
            <div class="gauge-labels">
                <span>Poor</span>
                <span>Fair</span>
                <span>Good</span>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Next interaction</div>
            <div id="next-interaction"></div>
        </div>

        <div class="section">
            <div class="section-title">Last interaction</div>
            <div id="last-interaction"></div>
        </div>

        <div class="section">
            <div class="section-title">Activity summary</div>
            <div id="stats-grid" class="stats-grid"></div>
        </div>
    </div>

    <div id="error" class="error-state" style="display:none;">
        <div class="error-icon">&#9888;</div>
        <p id="error-msg">Unable to load relationship health.</p>
    </div>

    <div id="no-data" class="no-data" style="display:none;">
        <div class="icon">&#128200;</div>
        <p>No relationship health data available for this opportunity.</p>
    </div>

    <script>
        // ─── Globals ─────────────────────────────────────────
        let opportunityId = null;
        let crmBaseUrl = "";

        // ─── Xrm Context ────────────────────────────────────
        function getXrmContext() {
            if (window.parent && window.parent.Xrm && window.parent.Xrm.Page) return window.parent.Xrm;
            if (window.parent && window.parent.Xrm && window.parent.Xrm.Utility) return window.parent.Xrm;
            return null;
        }

        function getOpportunityIdFromContext() {
            try {
                const xrm = getXrmContext();
                if (xrm && xrm.Page && xrm.Page.data && xrm.Page.data.entity) {
                    const id = xrm.Page.data.entity.getId();
                    if (id) return id.replace(/[{}]/g, "");
                }
            } catch (e) { /* ignore */ }

            const params = new URLSearchParams(window.location.search);
            const dataParam = params.get("data");
            if (dataParam) {
                try {
                    const parsed = JSON.parse(decodeURIComponent(dataParam));
                    if (parsed.id) return parsed.id.replace(/[{}]/g, "");
                } catch (e) { /* ignore */ }
            }
            const idParam = params.get("id");
            if (idParam) return idParam.replace(/[{}]/g, "");

            try {
                const parentUrl = window.parent.location.href;
                const match = parentUrl.match(/id=([0-9a-f-]{36})/i);
                if (match) return match[1];
            } catch (e) { /* cross-origin */ }

            return null;
        }

        function getCrmBaseUrl() {
            try {
                const xrm = getXrmContext();
                if (xrm && xrm.Utility && xrm.Utility.getGlobalContext)
                    return xrm.Utility.getGlobalContext().getClientUrl();
                if (xrm && xrm.Page && xrm.Page.context)
                    return xrm.Page.context.getClientUrl();
            } catch (e) { /* ignore */ }
            const origin = window.location.origin;
            if (origin.includes(".dynamics.com") || origin.includes(".crm")) return origin;
            return "https://hyagom.crm.dynamics.com";
        }

        // ─── API Helpers ─────────────────────────────────────
        async function crmApiFetch(url) {
            const apiBase = crmBaseUrl + "/api/data/v9.2";
            const res = await fetch(apiBase + url, {
                headers: {
                    "Accept": "application/json",
                    "OData-MaxVersion": "4.0",
                    "OData-Version": "4.0",
                    "Content-Type": "application/json",
                    "Prefer": 'odata.include-annotations="*"',
                },
            });
            if (!res.ok) {
                const err = await res.text();
                throw new Error("API error " + res.status + ": " + err);
            }
            if (res.status === 204) return null;
            return res.json();
        }

        function escapeHtml(str) {
            if (!str) return "";
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        // ─── Health State Helpers ────────────────────────────
        function getHealthInfo(state, trend) {
            const stateMap = {
                0: { label: "Good", css: "good", color: "var(--accent-green)" },
                1: { label: "Fair", css: "fair", color: "var(--accent-orange)" },
                2: { label: "Poor", css: "poor", color: "var(--accent-red)" },
            };
            const trendMap = {
                0: "Improving",
                1: "Steady",
                2: "Declining",
            };
            const s = stateMap[state] || stateMap[1];
            const t = trendMap[trend] || "Unknown";
            return { ...s, trend: t };
        }

        function getHealthIcon(css) {
            if (css === "good") {
                return '<svg viewBox="0 0 24 24"><path d="M4.53 12.97a.75.75 0 0 0-1.06 1.06l4.5 4.5a.75.75 0 0 0 1.06 0l11-11a.75.75 0 0 0-1.06-1.06L8.5 16.94l-3.97-3.97Z"/></svg>';
            }
            if (css === "fair") {
                return '<svg viewBox="0 0 24 24"><path d="M3.75 12a.75.75 0 0 0 0 1.5h16.5a.75.75 0 0 0 0-1.5H3.75Z"/></svg>';
            }
            return '<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm-.5 5.75a.75.75 0 0 1 1.5 0v5a.75.75 0 0 1-1.5 0v-5ZM12 17.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"/></svg>';
        }

        function getTrendArrow(trend) {
            switch (trend) {
                case 0: return "&#8599;"; // Improving ↗
                case 2: return "&#8600;"; // Declining ↘
                default: return "&#8594;"; // Steady →
            }
        }

        // ─── Format Activity Date ────────────────────────────
        function formatActivityDate(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            const options = { weekday: "long", year: "numeric", month: "long", day: "numeric", hour: "numeric", minute: "2-digit" };
            return d.toLocaleDateString("en-US", options);
        }

        function getActivityTypeIcon(typeCode) {
            switch (typeCode) {
                case "appointment":
                    return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.75 3A3.25 3.25 0 0 1 21 6.25v11.5A3.25 3.25 0 0 1 17.75 21H6.25A3.25 3.25 0 0 1 3 17.75V6.25A3.25 3.25 0 0 1 6.25 3h11.5ZM19.5 8.5h-15v9.25c0 .966.784 1.75 1.75 1.75h11.5a1.75 1.75 0 0 0 1.75-1.75V8.5Z"/></svg>';
                case "email":
                    return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M5.25 4h13.5A3.25 3.25 0 0 1 22 7.25v9.5A3.25 3.25 0 0 1 18.75 20H5.25A3.25 3.25 0 0 1 2 16.75v-9.5A3.25 3.25 0 0 1 5.25 4Z"/></svg>';
                case "phonecall":
                    return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.26 2.153a2.154 2.154 0 0 1 3.074.533l1.61 2.557a2.154 2.154 0 0 1-.462 2.768l-1.358 1.186a.416.416 0 0 0-.063.514c.706 1.208 1.74 2.427 3.103 3.663 1.378 1.25 2.472 1.983 3.481 2.388.2.08.36-.017.46-.1l1.34-1.263a2.154 2.154 0 0 1 2.684-.318l2.6 1.625a2.154 2.154 0 0 1 .57 3.014l-1.282 1.795a3.312 3.312 0 0 1-3.09 1.354c-2.455-.308-5.091-1.774-7.919-4.339-2.83-2.567-4.472-5.15-4.908-7.594a3.312 3.312 0 0 1 1.13-3.084l1.796-1.513Z"/></svg>';
                case "task":
                    return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.75 3A3.75 3.75 0 0 0 3 6.75v10.5A3.75 3.75 0 0 0 6.75 21h10.5A3.75 3.75 0 0 0 21 17.25V6.75A3.75 3.75 0 0 0 17.25 3H6.75Zm9.03 6.78-4.5 4.5a.75.75 0 0 1-1.06 0l-2-2a.75.75 0 1 1 1.06-1.06l1.47 1.47 3.97-3.97a.75.75 0 1 1 1.06 1.06Z"/></svg>';
                default:
                    return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Z"/></svg>';
            }
        }

        // ─── Render ──────────────────────────────────────────
        function renderHealth(kpi, activities) {
            const healthScore = kpi.msdyn_relationshiphealthscorevalue || 0;
            const healthState = kpi.msdyn_relationshiphealthscorestate;
            const healthTrend = kpi.msdyn_relationshiphealthtrend;
            const info = getHealthInfo(healthState, healthTrend);

            // Health badge
            const statusEl = document.getElementById("health-status");
            statusEl.innerHTML = `
                <div class="health-badge ${info.css}">
                    ${getHealthIcon(info.css)}
                </div>
                <div class="health-text">${info.label} relationship and ${info.trend}</div>
            `;

            // Gauge bar
            const barEl = document.getElementById("gauge-bar");
            setTimeout(() => {
                barEl.style.width = healthScore + "%";
                barEl.style.background = info.color;
            }, 50);

            // Next interaction
            const nextEl = document.getElementById("next-interaction");
            const futureActivities = activities.filter(a => {
                if (!a.scheduledstart) return false;
                return new Date(a.scheduledstart) > new Date() && a.statecode === 0;
            });

            if (futureActivities.length > 0) {
                const next = futureActivities[futureActivities.length - 1]; // earliest future
                nextEl.innerHTML = `
                    <div class="activity-row">
                        <div class="activity-icon has">${getActivityTypeIcon(next.activitytypecode)}</div>
                        <div>
                            <div class="activity-text">${escapeHtml(next.subject)}</div>
                            <div class="activity-detail">${formatActivityDate(next.scheduledstart)}</div>
                        </div>
                    </div>
                `;
            } else {
                nextEl.innerHTML = `
                    <div class="activity-row">
                        <div class="activity-icon none">
                            <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm3.53 12.47a.75.75 0 0 1-1.06 1.06L12 13.06l-2.47 2.47a.75.75 0 0 1-1.06-1.06L10.94 12 8.47 9.53a.75.75 0 0 1 1.06-1.06L12 10.94l2.47-2.47a.75.75 0 0 1 1.06 1.06L13.06 12l2.47 2.47Z"/></svg>
                        </div>
                        <div class="activity-text" style="color:var(--accent-red)">No upcoming activities scheduled</div>
                    </div>
                `;
            }

            // Last interaction
            const lastEl = document.getElementById("last-interaction");
            const pastActivities = activities.filter(a => {
                const date = a.actualend || a.scheduledstart;
                if (!date) return false;
                return new Date(date) <= new Date() || a.statecode === 1;
            });

            if (pastActivities.length > 0) {
                const last = pastActivities[0]; // most recent past
                const lastDate = last.actualend || last.scheduledstart;
                lastEl.innerHTML = `
                    <div class="activity-row">
                        <div class="activity-icon has">
                            <svg viewBox="0 0 24 24" fill="var(--text-secondary)"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm0 1.5a8.5 8.5 0 1 1 0 17 8.5 8.5 0 0 1 0-17Zm-.75 3.25a.75.75 0 0 1 1.5 0V12h3.5a.75.75 0 0 1 0 1.5h-4.25a.75.75 0 0 1-.75-.75V6.75Z"/></svg>
                        </div>
                        <div>
                            <div class="activity-text">${formatActivityDate(lastDate)}</div>
                            <div class="activity-detail">${escapeHtml(last.subject)}</div>
                        </div>
                    </div>
                `;
            } else {
                lastEl.innerHTML = `
                    <div class="activity-row">
                        <div class="activity-icon none">
                            <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm3.53 12.47a.75.75 0 0 1-1.06 1.06L12 13.06l-2.47 2.47a.75.75 0 0 1-1.06-1.06L10.94 12 8.47 9.53a.75.75 0 0 1 1.06-1.06L12 10.94l2.47-2.47a.75.75 0 0 1 1.06 1.06L13.06 12l2.47 2.47Z"/></svg>
                        </div>
                        <div class="activity-text" style="color:var(--text-tertiary)">No recorded interactions</div>
                    </div>
                `;
            }

            // Activity stats
            const statsEl = document.getElementById("stats-grid");
            const emailsTotal = (kpi.msdyn_emailssent || 0) + (kpi.msdyn_emailsreceived || 0);
            const meetingsTotal = (kpi.msdyn_meetingssent || 0) + (kpi.msdyn_meetingsreceived || 0);
            const callsTotal = (kpi.msdyn_phonecallsmade || 0) + (kpi.msdyn_phonecallsreceived || 0);
            const faceTime = kpi.msdyn_facetimewithcustomer || 0;

            const stats = [
                { value: emailsTotal, label: "Emails", color: "var(--primary)" },
                { value: meetingsTotal, label: "Meetings", color: "var(--accent-green)" },
                { value: callsTotal, label: "Phone calls", color: "var(--accent-orange)" },
                { value: faceTime > 60 ? Math.round(faceTime / 60) + "h" : faceTime + "m", label: "Face time", color: "#8764b8" },
            ];

            statsEl.innerHTML = stats.map(s => `
                <div class="stat-card">
                    <div class="stat-value" style="color:${s.color}">${s.value}</div>
                    <div class="stat-label">${s.label}</div>
                </div>
            `).join("");
        }

        // ─── Main ────────────────────────────────────────────
        async function init() {
            crmBaseUrl = getCrmBaseUrl();
            opportunityId = getOpportunityIdFromContext();

            if (!opportunityId) {
                showError("Could not determine the opportunity ID from the form context.");
                return;
            }

            try {
                // Fetch KPI item and activities in parallel
                const [kpiResult, activitiesResult] = await Promise.all([
                    crmApiFetch(
                        `/msdyn_opportunitykpiitems?$filter=_msdyn_opportunityid_value eq '${opportunityId}'&$top=1`
                    ),
                    crmApiFetch(
                        `/activitypointers?$filter=_regardingobjectid_value eq '${opportunityId}'&$select=subject,activitytypecode,scheduledstart,scheduledend,actualstart,actualend,statecode&$orderby=scheduledstart desc&$top=20`
                    ),
                ]);

                const kpi = kpiResult.value && kpiResult.value.length > 0 ? kpiResult.value[0] : null;
                const activities = activitiesResult.value || [];

                if (!kpi) {
                    showNoData();
                    return;
                }

                document.getElementById("loading").style.display = "none";
                document.getElementById("content").style.display = "block";
                renderHealth(kpi, activities);

            } catch (err) {
                showError("Error loading relationship health: " + err.message);
            }
        }

        function showError(msg) {
            document.getElementById("loading").style.display = "none";
            document.getElementById("error").style.display = "block";
            document.getElementById("error-msg").textContent = msg;
        }

        function showNoData() {
            document.getElementById("loading").style.display = "none";
            document.getElementById("no-data").style.display = "block";
        }

        // Start
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", init);
        } else {
            init();
        }
    </script>
</body>
</html>
